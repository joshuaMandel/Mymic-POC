name: Ingest neighborhood data

# Runs the WHOLE data pipeline on GitHub's servers (open internet), then commits
# the generated data back so the app picks it up on the next deploy. Everything
# is API-derived — which cities, which ZIPs, and every metric:
#   1. build-metros.mjs        — top cities by Census population + their ZCTAs
#   2. build-us-cities.mjs     — full Census Places type-ahead list
#   3. build-neighborhoods.mjs — Census ACS + OpenStreetMap metrics + names
# Ingestion is RESUMABLE (raw counts stored per record), so the weekly cron
# tops up coverage until every selected metro is complete.
# Requires a repo secret CENSUS_API_KEY (free: https://api.census.gov/data/key_signup.html).

on:
  workflow_dispatch:
    inputs:
      top_cities:
        description: "How many top-population cities to ingest"
        default: "40"
      zips_per_metro:
        description: "Max ZIP codes per city"
        default: "8"
      max_fetches:
        description: "Fetch budget this run (resumes next run)"
        default: "250"
  schedule:
    - cron: "0 6 * * 1" # weekly top-up: resumes any unfinished ingestion

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Download Census gazetteers + ZCTA↔Place relationship file
        run: |
          set -e
          mkdir -p data
          for Y in 2024 2023 2022; do
            if curl -fsSL -o place.zip "https://www2.census.gov/geo/docs/maps-data/data/gazetteer/${Y}_Gazetteer/${Y}_Gaz_place_national.zip"; then break; fi
          done
          for Y in 2023 2022 2021; do
            if curl -fsSL -o zcta.zip "https://www2.census.gov/geo/docs/maps-data/data/gazetteer/${Y}_Gazetteer/${Y}_Gaz_zcta_national.zip"; then break; fi
          done
          unzip -o place.zip -d data
          unzip -o zcta.zip -d data
          mv data/*_Gaz_place_national.txt data/gaz_place.txt
          mv data/*_Gaz_zcta_national.txt data/gaz_zcta.txt
          # 2020 ZCTA↔Place relationship file (path moved once; try both)
          curl -fsSL -o data/rel_zcta_place.txt "https://www2.census.gov/geo/docs/maps-data/data/rel2020/zcta520/tab20_zcta520_place20_natl.txt" \
            || curl -fsSL -o data/rel_zcta_place.txt "https://www2.census.gov/geo/docs/maps-data/data/rel2020/place/tab20_zcta520_place20_natl.txt"

      - name: Select metros + ZIPs (Census population — no hand-picked lists)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          TOP_CITIES: ${{ github.event.inputs.top_cities || '40' }}
          ZIPS_PER_METRO: ${{ github.event.inputs.zips_per_metro || '8' }}
        run: node scripts/build-metros.mjs

      - name: Build full US city list
        run: node scripts/build-us-cities.mjs

      - name: Build ZIP centroid lookup
        run: node scripts/build-zip-centroids.mjs

      - name: Build neighborhood data (Census + OpenStreetMap, resumable)
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          MAX_FETCHES: ${{ github.event.inputs.max_fetches || '250' }}
        run: node scripts/build-neighborhoods.mjs

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/us-cities.generated.json data/neighborhoods.generated.json data/metros.generated.json data/zip-centroids.generated.json
          if git diff --staged --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): ingest neighborhood + city data [skip ci]"
          # main may have advanced while ingestion ran (it takes minutes), so
          # rebase onto the latest before pushing and retry on a lost race.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $attempt failed (main moved); retrying…"
            sleep $((attempt * 5))
          done
          echo "::error::Could not push ingested data after 5 attempts."
          exit 1
